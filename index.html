<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FE2 Map Tracker</title>
<link rel="icon" href="/fe2-map-tracker/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f1f3f4;
    --bg2:       #ffffff;
    --bg3:       #f8f9fa;
    --bg4:       #e8eaed;
    --border:    #dadce0;
    --border2:   #bdc1c6;
    --text:      #202124;
    --muted:     #5f6368;
    --dim:       #9aa0a6;

    --accent:    #1a73e8;
    --accent2:   #1557b0;
    --accent-bg: #e8f0fe;

    --beginner:  #1ABC96;
    --easy:      #2e9e46;
    --normal:    #b8860b;
    --hard:      #d93025;
    --insane:    #7b1fa2;
    --crazy:     #e65100;
    --crazy2:    #bf360c;
    --extreme:   #1a237e;

    --prog-none:          #f1f3f4;
    --prog-concept:       #e8f0fe;
    --prog-building:      #fef3e2;
    --prog-deco:          #f3e8fd;
    --prog-testing:       #e6f4ea;
    --prog-done:          #ceead6;
    --prog-donebutmissing:#f0f4c3;

    --shadow-sm: 0 1px 2px 0 rgba(60,64,67,.30), 0 1px 3px 1px rgba(60,64,67,.15);
    --shadow-md: 0 1px 3px 0 rgba(60,64,67,.30), 0 4px 8px 3px rgba(60,64,67,.15);
    --shadow-focus: 0 0 0 2px #a8c7fa;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Roboto", sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body.light {
    /* light is the default, but keep the toggle working */
    --bg:        #f1f3f4;
    --bg2:       #ffffff;
    --bg3:       #f8f9fa;
    --bg4:       #e8eaed;
    --border:    #dadce0;
    --border2:   #bdc1c6;
    --text:      #202124;
    --muted:     #5f6368;
    --dim:       #9aa0a6;
    --prog-none:          #f1f3f4;
    --prog-concept:       #e8f0fe;
    --prog-building:      #fef3e2;
    --prog-deco:          #f3e8fd;
    --prog-testing:       #e6f4ea;
    --prog-done:          #ceead6;
    --prog-donebutmissing:#f0f4c3;
  }

  body.dark {
    --bg:        #1a1a1e;
    --bg2:       #1e1e24;
    --bg3:       #25252d;
    --bg4:       #2c2c36;
    --border:    #35353f;
    --border2:   #454550;
    --text:      #e2e2e8;
    --muted:     #9898aa;
    --dim:       #606070;

    --accent:    #8ab4f8;
    --accent2:   #aecbfa;
    --accent-bg: #1e2a45;

    --prog-none:          #25252d;
    --prog-concept:       #1e2a45;
    --prog-building:      #2e2010;
    --prog-deco:          #25103a;
    --prog-testing:       #0f2a1a;
    --prog-done:          #143520;
    --prog-donebutmissing:#252f10;

    --shadow-sm: 0 1px 2px 0 rgba(0,0,0,.5), 0 1px 3px 1px rgba(0,0,0,.3);
    --shadow-md: 0 1px 3px 0 rgba(0,0,0,.5), 0 4px 8px 3px rgba(0,0,0,.3);
  }

  /* TOPBAR (google sites style) */
  .topbar {
    background: var(--bg2);
    box-shadow: 0 1px 3px rgba(60,64,67,.15), 0 1px 2px rgba(60,64,67,.30);
    display: flex;
    align-items: center;
    padding: 0 24px;
    height: 64px;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, #6d00ff 0%, #9933ff 100%);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 700;
    font-size: 1rem;
    font-family: "Roboto", sans-serif;
    flex-shrink: 0;
    letter-spacing: -0.02em;
  }
  .topbar-title {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 0;
  }
  .topbar-title h1 {
    font-size: 1.125rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .topbar-title p {
    font-size: 0.7rem;
    color: var(--muted);
    font-family: "Iosevka Charon", monospace;
    letter-spacing: 0.05em;
  }
  .topbar-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  /* BUTTONS */
  .btn {
    font-family: "Roboto", sans-serif;
    font-weight: 500;
    font-size: 0.8125rem;
    padding: 0 16px;
    height: 36px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--muted);
    cursor: pointer;
    transition: background 0.1s, box-shadow 0.1s;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
  .btn:hover {
    background: var(--bg3);
    box-shadow: var(--shadow-sm);
  }
  .btn-primary {
    background: #6d00ff;
    border-color: transparent;
    color: #fff;
  }
  .btn-primary:hover { background: #5500cc; }
  .btn-danger { color: #c5221f; border-color: #f2b8b5; }
  .btn-danger:hover { background: #fce8e6; }
  .btn-sm { padding: 0 12px; height: 30px; font-size: 0.75rem; }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 0;
    padding: 0 24px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: stretch;
  }
  .stat {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
    padding: 14px 20px 14px 0;
    margin-right: 20px;
  }
  .stat-val {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1;
    color: #6d00ff;
    font-family: "Roboto", sans-serif;
  }
  .stat-label {
    font-size: 0.6875rem;
    color: var(--muted);
    letter-spacing: 0.02em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .stat-divider { width: 1px; background: var(--border); margin: 10px 20px 10px 0; align-self: stretch; }
  .progress-overview {
    flex: 1;
    min-width: 200px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 14px 0;
  }
  .progress-bar-label {
    font-size: 0.6rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .progress-bar-wrap {
    display: flex;
    height: 6px;
    border-radius: 3px;
    overflow: hidden;
    gap: 1px;
  }
  .progress-seg { height: 100%; transition: flex 0.4s; }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    gap: 8px;
    padding: 12px 24px;
    flex-wrap: wrap;
    align-items: center;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 2px 4px rgba(60,64,67,.08);
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 160px;
    max-width: 320px;
  }
  .search-wrap input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 8px 14px 8px 36px;
    color: var(--text);
    font-family: "Roboto", sans-serif;
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
  }
  .search-wrap input:focus {
    border-color: var(--accent);
    background: var(--bg2);
    box-shadow: var(--shadow-focus);
  }
  .search-wrap input::placeholder { color: var(--dim); }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--dim);
    font-size: 0.9rem;
    pointer-events: none;
  }
  .filter-group { display: flex; gap: 4px; flex-wrap: wrap; }
  .pill {
    font-family: "Iosevka Charon", monospace;
    font-size: 0.6rem;
    padding: 5px 11px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.12s;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .pill:hover { border-color: var(--border2); background: var(--bg3); color: var(--text); }
  .pill.active { color: #fff; border-color: transparent; }
  .pill[data-diff="all"].active   { background: #6d00ff; }
  .pill[data-diff="Beginner"].active { background: #1ABC96; color: #003328; }
  .pill[data-diff="Easy"].active  { background: #2e9e46; }
  .pill[data-diff="Normal"].active{ background: #b8860b; }
  .pill[data-diff="Hard"].active  { background: #d93025; }
  .pill[data-diff="Insane"].active{ background: #7b1fa2; }
  .pill[data-diff="Crazy"].active { background: #e65100; }
  .pill[data-diff="Crazy+"].active{ background: #bf360c; }
  .pill[data-diff="Extreme"].active { background: #1a237e; }

  .sort-select {
    font-family: "Roboto", sans-serif;
    font-size: 0.8125rem;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    padding: 6px 10px;
    outline: none;
    cursor: pointer;
    height: 36px;
    transition: border-color 0.15s;
  }
  .sort-select:focus { border-color: var(--accent); }

  /* VIEW TOGGLE */
  .view-toggle { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .view-btn {
    width: 36px; height: 34px;
    border: none;
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem;
    transition: all 0.12s;
  }
  .view-btn + .view-btn { border-left: 1px solid var(--border); }
  .view-btn:hover { background: var(--bg3); color: var(--text); }
  .view-btn.active { background: var(--accent-bg); color: var(--accent); }

  /* GRID */
  #map-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
    padding: 24px;
  }
  #map-grid.list-view {
    grid-template-columns: 1fr;
    gap: 8px;
  }

  /* CARD */
  .card {
    background: var(--bg2);
    border: none;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s;
    cursor: pointer;
    position: relative;
  }
  .card:hover {
    box-shadow: var(--shadow-md);
  }
  .card.done-card {
    border-left: 4px solid #34a853;
  }
  .card-accent {
    height: 4px;
    width: 100%;
  }
  .card-body { padding: 14px 16px 16px; }
  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }
  .card-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .diff-pill {
    font-family: "Iosevka Charon", monospace;
    font-size: 0.58rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    letter-spacing: 0.04em;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .card-name {
    font-size: 0.9375rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }
  .card-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .card:hover .card-actions { opacity: 1; }
  .card-act-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
    transition: all 0.12s;
  }
  .card-act-btn:hover { background: var(--bg4); color: var(--text); }
  .card-act-btn.delete:hover { background: #fce8e6; color: #c5221f; }

  .stars-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
  }
  .stars { font-size: 0.75rem; letter-spacing: 0.5px; }
  .star-num {
    font-family: "Iosevka Charon", monospace;
    font-size: 0.65rem;
    color: var(--muted);
  }
  .card-desc {
    font-size: 0.8125rem;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 10px;
  }
  .tag-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 12px; }
  .tag {
    font-family: "Iosevka Charon", monospace;
    font-size: 0.58rem;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--muted);
    letter-spacing: 0.03em;
  }

  /* PROGRESS */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .progress-select {
    font-family: "Roboto", sans-serif;
    font-size: 0.75rem;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    padding: 4px 8px;
    outline: none;
    cursor: pointer;
    flex: 1;
    height: 30px;
    transition: border-color 0.15s;
  }
  .progress-select:hover { border-color: var(--border2); }
  .progress-select:focus { border-color: var(--accent); }
  .prog-badge {
    font-family: "Iosevka Charon", monospace;
    font-size: 0.6rem;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    letter-spacing: 0.03em;
    font-weight: 500;
  }
  .prog-none     { background: var(--prog-none); color: var(--dim); }
  .prog-concept  { background: var(--prog-concept); color: #1557b0; }
  .prog-building { background: var(--prog-building); color: #7a4f00; }
  .prog-deco     { background: var(--prog-deco); color: #5e1882; }
  .prog-testing  { background: var(--prog-testing); color: #137333; }
  .prog-done     { background: var(--prog-done); color: #0d652d; }
  .prog-donebutmissing { background: var(--prog-donebutmissing); color: #614700; }

  /* LIST VIEW */
  #map-grid.list-view .card-body {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
  }
  #map-grid.list-view .card-accent { display: none; }
  #map-grid.list-view .card {
    border-left: 4px solid transparent;
    border-radius: 4px;
  }
  #map-grid.list-view .card-top { margin-bottom: 0; flex: 1; min-width: 0; }
  #map-grid.list-view .card-desc { display: none; }
  #map-grid.list-view .tag-row { display: none; }
  #map-grid.list-view .stars-row { margin-bottom: 0; }
  #map-grid.list-view .progress-row { flex-shrink: 0; }
  #map-grid.list-view .card-actions { opacity: 1; }

  /* diff accent border on list mode */
  .border-beginner { border-left-color: var(--beginner) !important; }
  .border-easy     { border-left-color: var(--easy) !important; }
  .border-normal   { border-left-color: var(--normal) !important; }
  .border-hard     { border-left-color: var(--hard) !important; }
  .border-insane   { border-left-color: var(--insane) !important; }
  .border-crazy    { border-left-color: var(--crazy) !important; }
  .border-crazy2   { border-left-color: var(--crazy2) !important; }
  .border-extreme  { border-left-color: var(--extreme) !important; }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(32,33,36,.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 1rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg2);
    border: none;
    border-radius: 8px;
    padding: 24px;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 8px 10px 1px rgba(0,0,0,.14), 0 3px 14px 2px rgba(0,0,0,.12), 0 5px 5px -3px rgba(0,0,0,.2);
    transform: scale(0.97);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal h2 {
    font-size: 1.1rem;
    font-weight: 500;
    margin-bottom: 1.25rem;
    color: var(--text);
  }
  .form-grid { display: flex; flex-direction: column; gap: 14px; }
  .form-row { display: flex; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .form-group label {
    font-size: 0.6875rem;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .form-group input,
  .form-group textarea,
  .form-group select {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: "Roboto", sans-serif;
    font-size: 0.875rem;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    border-color: var(--accent);
    box-shadow: var(--shadow-focus);
    background: var(--bg2);
  }
  .form-group textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }

  /* DETAIL MODAL */
  .detail-diff { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 0.8rem; }
  .detail-stars { font-size: 1rem; letter-spacing: 1px; }
  .detail-star-num {
    font-family: "Iosevka Charon", monospace;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .detail-desc { font-size: 0.875rem; color: var(--muted); line-height: 1.6; margin-bottom: 1rem; }
  .detail-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
  .detail-tag {
    font-family: "Iosevka Charon", monospace;
    font-size: 0.65rem;
    padding: 3px 9px;
    border-radius: 4px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .detail-notes {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px;
    margin-bottom: 1rem;
  }
  .detail-notes label {
    font-size: 0.6875rem;
    font-weight: 500;
    color: var(--dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 8px;
  }
  .detail-notes textarea {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: "Roboto", sans-serif;
    font-size: 0.875rem;
    outline: none;
    resize: vertical;
    min-height: 60px;
    line-height: 1.5;
  }
  .detail-progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .detail-progress-label {
    font-size: 0.6875rem;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--dim);
    grid-column: 1 / -1;
  }
  .empty-state h3 { font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--muted); font-weight: 400; }
  .empty-state p { font-size: 0.8125rem; font-family: "Iosevka Charon", monospace; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg3); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .topbar { padding: 0 16px; }
    .stats-bar, .toolbar, #map-grid { padding-left: 16px; padding-right: 16px; }
    #map-grid { grid-template-columns: 1fr; }
    .form-row { flex-direction: column; }
    .topbar-title p { display: none; }
  }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: #323232;
    border: none;
    border-radius: 4px;
    padding: 10px 18px;
    font-size: 0.875rem;
    font-family: "Roboto", sans-serif;
    font-weight: 400;
    color: #fff;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    z-index: 2000;
    pointer-events: none;
    box-shadow: 0 3px 5px -1px rgba(0,0,0,.2), 0 6px 10px 0 rgba(0,0,0,.14), 0 1px 18px 0 rgba(0,0,0,.12);
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* modal h2 font override for detail */
  #detail-content h2 {
    font-size: 1.25rem;
    font-weight: 500;
    margin-bottom: 0.75rem;
    color: var(--text);
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-icon">FE2</div>
  <div class="topbar-title">
    <h1>FE2 Map Tracker</h1>
    <p>A site to log your map ideas</p>
  </div>
  <div class="topbar-actions">
    <button class="btn btn-sm" id="export-btn">↓ Export</button>
    <button class="btn btn-sm" id="import-btn">↑ Import</button>
    <input type="file" id="import-file" accept=".json" style="display:none">
    <button class="btn btn-primary btn-sm" id="add-btn">+ Add Map</button>
    <button class="btn btn-sm" id="theme-toggle" title="Toggle theme">☀</button>
  </div>
</header>

<div class="stats-bar" id="stats-bar"></div>

<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Search maps...">
  </div>
  <div class="filter-group" id="diff-filters"></div>
  <select class="sort-select" id="sort-select">
    <option value="diff">Sort: Difficulty</option>
    <option value="stars">Sort: Stars</option>
    <option value="name">Sort: Name A-Z</option>
    <option value="progress">Sort: Progress</option>
    <option value="added">Sort: Recently Added</option>
  </select>
  <div class="view-toggle">
    <button class="view-btn active" id="grid-view-btn" title="Grid view">⊞</button>
    <button class="view-btn" id="list-view-btn" title="List view">☰</button>
  </div>
</div>

<div id="map-grid"></div>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h2 id="modal-title">Add Map Idea</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Map Name</label>
        <input type="text" id="f-name" placeholder="e.g. Marred Dreams">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Difficulty</label>
          <select id="f-diff">
            <option>Beginner</option>
            <option>Easy</option>
            <option selected>Normal</option>
            <option>Hard</option>
            <option>Insane</option>
            <option>Crazy</option>
            <option>Crazy+</option>
            <option>Extreme</option>
          </select>
        </div>
        <div class="form-group">
          <label>Stars (0.0 – 7.99)</label>
          <input type="number" id="f-stars" min="0.0" max="7.99" step="0.1" placeholder="e.g. 4.5">
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="f-desc" placeholder="What's the concept, theme, vibe..."></textarea>
      </div>
      <div class="form-group">
        <label>Tags (comma separated)</label>
        <input type="text" id="f-tags" placeholder="e.g. outdoor, lava, vertical">
      </div>
      <div class="form-group">
        <label>Progress</label>
        <select id="f-progress">
          <option value="none">Not Started</option>
          <option value="concept">Concept</option>
          <option value="building">Building</option>
          <option value="deco">Decorating</option>
          <option value="testing">Testing</option>
          <option value="done">Done</option>
          <option value="donebutmissing">Done but needs update</option>
        </select>
      </div>
      <div class="form-group">
        <label>Notes (optional)</label>
        <textarea id="f-notes" placeholder="OST ideas, section plans, collabs..."></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-sm" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary btn-sm" id="modal-save">Save Map</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div id="detail-content"></div>
    <div class="modal-actions">
      <button class="btn btn-danger btn-sm" id="detail-delete">Delete</button>
      <button class="btn btn-sm" id="detail-edit">Edit</button>
      <button class="btn btn-sm" id="detail-close">Close</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const themeToggle = document.getElementById("theme-toggle");
const savedTheme = localStorage.getItem("theme");

if (savedTheme === "dark") {
  document.body.classList.add("dark");
  themeToggle.textContent = "☾";
}

if (themeToggle) {
  themeToggle.addEventListener("click", () => {
    const isDark = document.body.classList.toggle("dark");
    themeToggle.textContent = isDark ? "☾" : "☀";
    localStorage.setItem("theme", isDark ? "dark" : "light");
  });
}

// DATA
const DIFF_ORDER = ["Beginner","Easy","Normal","Hard","Insane","Crazy","Crazy+","Extreme"];
const DIFF_COLORS = {
  Beginner: "#1ABC96",
  Easy: "#2e9e46",
  Normal: "#b8860b",
  Hard: "#d93025",
  Insane: "#7b1fa2",
  Crazy: "#e65100",
  "Crazy+": "#bf360c",
  Extreme: "#1a237e"
};
const PROG_LABELS = {
  none:"Not Started", concept:"Concept", building:"Building",
  deco:"Decorating", testing:"Testing", done:"Done ✓", donebutmissing:"Done but will be updated"
};

const DEFAULT_MAPS = [
  { name:"Example", diff:"Beginner", stars:0.3, desc:"Example map", tags:["example"] },
];

// STATE
let maps = [];
let editingId = null;
let detailId = null;
let filterDiff = "all";
let sortMode = "diff";
let searchQ = "";
let viewMode = "grid";

function loadMaps() {
  try {
    const saved = localStorage.getItem("fe2_maps");
    if (saved) { maps = JSON.parse(saved); return; }
  } catch(e) {}
  maps = DEFAULT_MAPS.map((m, i) => ({
    ...m, id: Date.now() + i, progress: m.progress || "none", notes: m.notes || "", addedAt: Date.now() + i
  }));
  saveMaps();
}

function saveMaps() {
  localStorage.setItem("fe2_maps", JSON.stringify(maps));
}

// RENDER
function diffKey(d) { return d.toLowerCase().replace(/[^a-z]/g,''); }

function starBar(s, size=12) {
  const max = 9;
  let out = "";
  for (let i=1;i<=max;i++) {
    out += `<span style="font-size:${size}px;color:${i<=Math.round(s)?'#EF9F27':'#dadce0'}">★</span>`;
  }
  return out;
}

function progBadge(p) {
  return `<span class="prog-badge prog-${p}">${PROG_LABELS[p]||p}</span>`;
}

function getFiltered() {
  let list = [...maps];
  if (filterDiff !== "all") list = list.filter(m => m.diff === filterDiff);
  if (searchQ) {
    const q = searchQ.toLowerCase();
    list = list.filter(m =>
      m.name.toLowerCase().includes(q) ||
      (m.desc||"").toLowerCase().includes(q) ||
      (m.tags||[]).some(t => t.toLowerCase().includes(q))
    );
  }
  if (sortMode === "stars")    list.sort((a,b) => a.stars - b.stars);
  else if (sortMode === "name") list.sort((a,b) => a.name.localeCompare(b.name));
  else if (sortMode === "progress") {
    const po = ["none","concept","building","deco","testing","done"];
    list.sort((a,b) => po.indexOf(b.progress||"none") - po.indexOf(a.progress||"none"));
  }
  else if (sortMode === "added") list.sort((a,b) => (b.addedAt||0) - (a.addedAt||0));
  else list.sort((a,b) => DIFF_ORDER.indexOf(a.diff) - DIFF_ORDER.indexOf(b.diff) || a.stars - b.stars);
  return list;
}

function renderStats() {
  const total = maps.length;
  const done  = maps.filter(m => m.progress === "done").length;
  const donebutmissing = maps.filter(m => m.progress === "donebutmissing").length;
  const wip   = maps.filter(m => ["concept","building","deco","testing"].includes(m.progress)).length;
  const progCounts = { none:0, concept:0, building:0, deco:0, testing:0, done:0, donebutmissing: 0 };
  maps.forEach(m => { progCounts[m.progress||"none"]++; });

  const progColors = { none:"#dadce0", concept:"#4285f4", building:"#f9ab00", deco:"#9334e6", testing:"#34a853", done:"#0d652d", donebutmissing:"#bfdd66" };

  document.getElementById("stats-bar").innerHTML = `
    <div class="stat"><span class="stat-val">${total}</span><span class="stat-label">Total Maps</span></div>
    <div class="stat-divider"></div>
    <div class="stat"><span class="stat-val">${wip}</span><span class="stat-label">In Progress</span></div>
    <div class="stat">
      <span class="stat-val">${done} <span style="font-size:.9rem;color:var(--muted)">(+${donebutmissing})</span></span>
      <span class="stat-label">Completed</span>
    </div>
    <div class="stat-divider"></div>
    <div class="progress-overview">
      <div class="progress-bar-label">Progress breakdown</div>
      <div class="progress-bar-wrap">
        ${Object.entries(progCounts).map(([k,v]) =>
          v>0 ? `<div class="progress-seg" style="flex:${v};background:${progColors[k]}" title="${PROG_LABELS[k]}: ${v}"></div>` : ''
        ).join('')}
      </div>
    </div>
  `;
}

function renderFilters() {
  const diffs = ["all", ...DIFF_ORDER];
  document.getElementById("diff-filters").innerHTML = diffs.map(d => {
    const count = d === "all" ? maps.length : maps.filter(m=>m.diff===d).length;
    return `<button class="pill${filterDiff===d?' active':''}" data-diff="${d}">${d==="all"?"All":d} <span style="opacity:.5">${count}</span></button>`;
  }).join('');
  document.querySelectorAll('.pill').forEach(p => p.addEventListener('click', () => {
    filterDiff = p.dataset.diff;
    renderFilters();
    renderGrid();
  }));
}

function renderGrid() {
  const list = getFiltered();
  const grid = document.getElementById("map-grid");
  grid.className = viewMode === "list" ? "list-view" : "";

  if (!list.length) {
    grid.innerHTML = `<div class="empty-state"><h3>No maps found</h3><p>try a different filter or add a new map</p></div>`;
    return;
  }

  grid.innerHTML = list.map(m => {
    const col = DIFF_COLORS[m.diff] || "#888";
    const dk = diffKey(m.diff);
    return `
    <div class="card${m.progress==='done'?' done-card':''} border-${dk}" data-id="${m.id}">
      <div class="card-accent" style="background:${col}"></div>
      <div class="card-body">
        <div class="card-top">
          <div>
            <div class="card-title-row">
              <span class="diff-pill" style="background:${col}22;color:${col};border:1px solid ${col}44">${m.diff}</span>
              <span class="card-name">${m.name}</span>
            </div>
            <div class="stars-row" style="margin-top:5px">
              <span class="stars">${starBar(m.stars)}</span>
              <span class="star-num">${m.stars.toFixed(1)}★</span>
            </div>
          </div>
          <div class="card-actions">
            <button class="card-act-btn edit-btn" data-id="${m.id}" title="Edit">✎</button>
            <button class="card-act-btn delete delete-btn" data-id="${m.id}" title="Delete">✕</button>
          </div>
        </div>
        <div class="card-desc">${m.desc||''}</div>
        <div class="tag-row">${(m.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        <div class="progress-row">
          <select class="progress-select" data-id="${m.id}">
            ${['none','concept','building','deco','testing','done','donebutmissing'].map(p=>`<option value="${p}"${(m.progress||'none')===p?' selected':''}>${PROG_LABELS[p]}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>`;
  }).join('');

  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.edit-btn') || e.target.closest('.delete-btn') || e.target.closest('.progress-select')) return;
      openDetail(card.dataset.id);
    });
  });
  document.querySelectorAll('.edit-btn').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); openEdit(b.dataset.id); }));
  document.querySelectorAll('.delete-btn').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); deleteMap(b.dataset.id); }));
  document.querySelectorAll('.progress-select').forEach(sel => {
    sel.addEventListener('change', e => {
      e.stopPropagation();
      const m = maps.find(x => x.id == sel.dataset.id);
      if (m) { m.progress = sel.value; saveMaps(); renderStats(); renderGrid(); }
    });
  });
}

// MODALS
function openEdit(id) {
  editingId = id || null;
  const m = id ? maps.find(x => x.id == id) : null;
  document.getElementById("modal-title").textContent = m ? "Edit Map" : "Add Map Idea";
  document.getElementById("f-name").value    = m ? m.name : "";
  document.getElementById("f-diff").value    = m ? m.diff : "Normal";
  document.getElementById("f-stars").value   = m ? m.stars : "";
  document.getElementById("f-desc").value    = m ? m.desc : "";
  document.getElementById("f-tags").value    = m ? (m.tags||[]).join(", ") : "";
  document.getElementById("f-progress").value= m ? (m.progress||"none") : "none";
  document.getElementById("f-notes").value   = m ? (m.notes||"") : "";
  document.getElementById("edit-modal").classList.add("open");
  document.getElementById("f-name").focus();
}

function closeEdit() { document.getElementById("edit-modal").classList.remove("open"); editingId = null; }

function saveEdit() {
  const name = document.getElementById("f-name").value.trim();
  if (!name) { toast("Name required!"); return; }
  const stars = parseFloat(document.getElementById("f-stars").value);
  if (isNaN(stars) || stars < 0.1 || stars > 9.9) { toast("Stars must be 0.1–9.9"); return; }
  const tags = document.getElementById("f-tags").value.split(",").map(t=>t.trim()).filter(Boolean);

  if (editingId) {
    const m = maps.find(x => x.id == editingId);
    if (m) { Object.assign(m, { name, diff: document.getElementById("f-diff").value, stars, desc: document.getElementById("f-desc").value.trim(), tags, progress: document.getElementById("f-progress").value, notes: document.getElementById("f-notes").value.trim() }); }
  } else {
    maps.push({ id: Date.now(), name, diff: document.getElementById("f-diff").value, stars, desc: document.getElementById("f-desc").value.trim(), tags, progress: document.getElementById("f-progress").value, notes: document.getElementById("f-notes").value.trim(), addedAt: Date.now() });
  }
  saveMaps(); closeEdit(); renderFilters(); renderStats(); renderGrid();
  toast(editingId ? "Map updated!" : "Map added!");
}

function deleteMap(id) {
  const m = maps.find(x => x.id == id);
  if (!m) return;
  if (!confirm(`Delete "${m.name}"? This can't be undone.`)) return;
  maps = maps.filter(x => x.id != id);
  saveMaps(); closeDetail(); renderFilters(); renderStats(); renderGrid();
  toast("Map deleted.");
}

function openDetail(id) {
  detailId = id;
  const m = maps.find(x => x.id == id);
  if (!m) return;
  const col = DIFF_COLORS[m.diff] || "#888";
  document.getElementById("detail-content").innerHTML = `
    <h2>${m.name}</h2>
    <div class="detail-diff">
      <span class="diff-pill" style="background:${col}22;color:${col};border:1px solid ${col}44">${m.diff}</span>
      <span class="detail-stars">${starBar(m.stars,14)}</span>
      <span class="detail-star-num">${m.stars.toFixed(1)}★</span>
    </div>
    <div class="detail-desc">${m.desc||'No description.'}</div>
    <div class="detail-tags">${(m.tags||[]).map(t=>`<span class="detail-tag">${t}</span>`).join('')}</div>
    <div class="detail-notes">
      <label>Notes / Ideas</label>
      <textarea id="detail-notes-ta" placeholder="OST ideas, section plans, collabs, layout notes...">${m.notes||''}</textarea>
    </div>
    <div class="detail-progress-row">
      <span class="detail-progress-label">Progress:</span>
      <select class="progress-select" id="detail-prog-sel">
        ${['none','concept','building','deco','testing','done','donebutmissing'].map(p=>`<option value="${p}"${(m.progress||'none')===p?' selected':''}>${PROG_LABELS[p]}</option>`).join('')}
      </select>
    </div>
  `;
  document.getElementById("detail-modal").classList.add("open");
  document.getElementById("detail-prog-sel").addEventListener("change", e => {
    m.progress = e.target.value; saveMaps(); renderStats(); renderGrid();
  });
  document.getElementById("detail-notes-ta").addEventListener("input", e => {
    m.notes = e.target.value; saveMaps();
  });
}
function closeDetail() { document.getElementById("detail-modal").classList.remove("open"); detailId = null; }

// EXPORT / IMPORT
document.getElementById("export-btn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(maps, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "fe2-maps.json";
  a.click();
  toast("Exported fe2-maps.json!");
});
document.getElementById("import-btn").addEventListener("click", () => document.getElementById("import-file").click());
document.getElementById("import-file").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) throw new Error();
      maps = data;
      saveMaps(); renderFilters(); renderStats(); renderGrid();
      toast(`Imported ${data.length} maps!`);
    } catch { toast("Invalid JSON file!"); }
    e.target.value = "";
  };
  reader.readAsText(file);
});

// EVENTS
document.getElementById("add-btn").addEventListener("click", () => openEdit(null));
document.getElementById("modal-cancel").addEventListener("click", closeEdit);
document.getElementById("modal-save").addEventListener("click", saveEdit);
document.getElementById("detail-close").addEventListener("click", closeDetail);
document.getElementById("detail-edit").addEventListener("click", () => { const id = detailId; closeDetail(); openEdit(id); });
document.getElementById("detail-delete").addEventListener("click", () => deleteMap(detailId));

document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if (e.target === o) { closeEdit(); closeDetail(); } }));

document.getElementById("search").addEventListener("input", e => { searchQ = e.target.value; renderGrid(); });
document.getElementById("sort-select").addEventListener("change", e => { sortMode = e.target.value; renderGrid(); });

document.getElementById("grid-view-btn").addEventListener("click", () => {
  viewMode = "grid";
  document.getElementById("grid-view-btn").classList.add("active");
  document.getElementById("list-view-btn").classList.remove("active");
  renderGrid();
});
document.getElementById("list-view-btn").addEventListener("click", () => {
  viewMode = "list";
  document.getElementById("list-view-btn").classList.add("active");
  document.getElementById("grid-view-btn").classList.remove("active");
  renderGrid();
});

document.addEventListener("keydown", e => {
  if (e.key === "Escape") { closeEdit(); closeDetail(); }
});

// TOAST
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._to);
  t._to = setTimeout(() => t.classList.remove("show"), 2200);
}

// INIT
loadMaps();
renderFilters();
renderStats();
renderGrid();
</script>
</body>
</html>
